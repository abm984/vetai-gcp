# ──────────────────────────────────────────────────────────────────────────────
# cloudbuild.yaml — Google Cloud Build CI/CD pipeline
#
# Triggered automatically on every push to the main branch (configure in
# Cloud Build → Triggers).
#
# Steps:
#   1. Build the Docker image
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1           # change to your preferred region
  _SERVICE: vetapp-api
  _REPO: vetapp                  # Artifact Registry repository name
  _IMAGE: vetapp-api

steps:
  # 1. Build image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - .

  # 2. Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}

  # 3. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 4Gi
      - --cpu
      - "2"
      - --concurrency
      - "10"
      - --timeout
      - "300"
      - --set-env-vars
      - PORT=8080,GCS_BUCKET=vetapp-data,GCS_MODELS_PREFIX=models/,GEMINI_MODEL=gemini-2.5-flash
      - --update-secrets
      - GEMINI_API_KEY=gemini-api-key:latest,WA_ACCESS_TOKEN=wa-access-token:latest,WA_APP_SECRET=wa-app-secret:latest,WA_VERIFY_TOKEN=wa-verify-token:latest,WA_PHONE_ID=wa-phone-id:latest,VET_NUMBERS=vet-numbers:latest,DATABASE_URL=vetapp-db-url:latest
      - --add-cloudsql-instances
      - $PROJECT_ID:${_REGION}:vetapp-db

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8    # faster builds for the large ML image
